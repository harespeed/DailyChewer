services:
  postgres:
    image: postgres:16
    container_name: dailychewer_postgres
    environment:
      POSTGRES_DB: dailychewer
      POSTGRES_USER: dailychewer
      POSTGRES_PASSWORD: dailychewer_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailychewer -d dailychewer"]
      interval: 5s
      timeout: 5s
      retries: 10

  dailychewer:
    build:
      context: .
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-true}
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.tuna.tsinghua.edu.cn}
    image: dailychewer:latest
    env_file:
      - path: .env
        required: false
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./input:/app/input
    working_dir: /app
    stdin_open: true
    tty: true
    command: ["--help"]

  backend:
    build:
      context: .
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-true}
        APT_MIRROR: ${APT_MIRROR:-https://mirrors.tuna.tsinghua.edu.cn/debian}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-mirrors.tuna.tsinghua.edu.cn}
    image: dailychewer:latest
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    entrypoint: []
    command: ["uvicorn", "backend.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./config:/app/config
      - ./alembic.ini:/app/alembic.ini
      - ./data:/app/data
      - ./input:/app/input
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    working_dir: /app
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
